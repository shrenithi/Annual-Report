<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Institutional Annual Report Portal - Integrate, customize, and compile departmental achievements, research publications, grants, and placements into unified PDF reports.">
  <title>Annual Report Integration Portal</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Chart.js CDN (Loaded synchronously to execute dashboard widgets) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- App Shell Layout -->
  <div id="app-container">
    
    <!-- Dynamic Sidebar (Rendered via app.js) -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Dynamic Pane -->
    <main class="content-pane" id="content-pane">
      <!-- Pages are injected dynamically by app.js router -->
    </main>

  </div>

  <!-- Javascript Modules (Loaded in sequence to prevent dependencies collisions) -->
  <script src="./mockData.js"></script>
  <script src="./charts.js"></script>
  <script src="./reportTemplate.js"></script>
  <script src="./app.js"></script>

</body>
</html>
