  <!-- Global Error Logger (Displays browser console errors on screen for instant debugging) -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      // Ignore obfuscated browser cross-origin errors (e.g., from CDN or extensions)
      if (message === "Script error." || lineno === 0) {
        console.warn("Non-critical script load anomaly detected. This is typical when running via file:// or offline without CDN access.");
        return true;
      }
      
      const errBanner = document.getElementById("screen-error-banner") || document.createElement("div");
      errBanner.id = "screen-error-banner";
      errBanner.style.cssText = "position:fixed; top:0; left:0; width:100%; background:#ef4444; color:#fff; padding:15px; z-index:99999; font-family:monospace; font-size:12px; border-bottom:3px solid #b91c1c; text-align:left; box-sizing:border-box; line-height:1.5;";
      errBanner.innerHTML = "<strong>Application Startup Error Detected:</strong><br>" + 
                            "• Error: " + message + "<br>" +
                            "• File: " + (source ? source.split('/').pop() : "unknown") + " (Line " + lineno + ":" + colno + ")<br><br>" +
                            "<small>Please copy this error and share it so we can resolve it instantly.</small>";
      if (!document.getElementById("screen-error-banner")) {
        document.body.appendChild(errBanner);
      }
      return false;
    };
  </script>
